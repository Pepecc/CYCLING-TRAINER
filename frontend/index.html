<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycling Coach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --accent: #e8ff47;
    --accent2: #b8cc30;
    --user-bg: #1e2a1e;
    --user-border: rgba(232,255,71,0.2);
    --assistant-bg: #1a1a1a;
  }

  body {
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
  }

  /* AUTH */
  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2rem;
  }

  .auth-logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .auth-logo svg { width: 40px; height: 40px; }

  .auth-logo-text {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .auth-tagline {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .auth-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 2rem;
    width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }

  .auth-tab {
    background: none;
    border: none;
    color: var(--text3);
    padding: 0.5rem 1rem 0.75rem;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }

  .field input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 0.6rem 0.8rem;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 6px;
    padding: 0.7rem 1rem;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .auth-error {
    font-size: 12px;
    color: #ff6b6b;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
  }

  /* APP LAYOUT */
  #app-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  #app-screen.visible { display: flex; }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .topbar-logo {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .topbar-sep { color: var(--text3); }

  .topbar-conv {
    font-size: 12px;
    color: var(--text2);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    padding: 0.35rem 0.75rem;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }

  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  /* MAIN */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); }

  .btn-new {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    padding: 0.2rem 0.5rem;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    transition: all 0.15s;
  }

  .btn-new:hover { background: rgba(232,255,71,0.07); border-color: var(--accent); }

  .conv-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
  .conv-list::-webkit-scrollbar { width: 3px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .conv-item {
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: all 0.1s;
    border: 1px solid transparent;
  }

  .conv-item:hover { background: var(--bg3); color: var(--text); }
  .conv-item.active { background: var(--bg3); color: var(--text); border-color: var(--border); }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
  }

  .btn-profile {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    transition: color 0.15s;
    width: 100%;
  }

  .btn-profile:hover { color: var(--text); }

  /* CHAT */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 680px;
    gap: 4px;
  }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 2px;
  }

  .msg-bubble {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    line-height: 1.7;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid var(--user-border);
    color: var(--accent);
  }

  .msg.assistant .msg-bubble {
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg-time { font-size: 10px; color: var(--text3); }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--text3);
  }

  .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 500px;
    margin-top: 0.5rem;
  }

  .quick-prompt {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.4rem 0.9rem;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .quick-prompt:hover { border-color: var(--accent); color: var(--accent); }

  /* INPUT */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--bg);
  }

  .input-wrap { flex: 1; position: relative; }

  textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 0.65rem 0.9rem;
    font-family: inherit;
    font-size: 13px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    min-height: 42px;
    max-height: 160px;
    line-height: 1.5;
    display: block;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  .btn-send {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    width: 40px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-send:hover { background: var(--accent2); }
  .btn-send:active { transform: scale(0.95); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-send svg { width: 16px; height: 16px; color: #0f0f0f; }

  /* TYPING INDICATOR */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0.5rem 0;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* PROFILE MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .modal-overlay.visible { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 1.75rem;
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    transform: translateY(8px);
    transition: transform 0.15s;
  }

  .modal-overlay.visible .modal { transform: translateY(0); }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title { font-size: 14px; font-weight: 600; color: var(--text); }

  .btn-close {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 18px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }

  .btn-close:hover { color: var(--text); }

  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .field select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 0.6rem 0.8rem;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .field select:focus { border-color: var(--accent); }

  .field.span2 { grid-column: span 2; }

  .profile-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--accent);
    background: rgba(232,255,71,0.07);
    border: 1px solid rgba(232,255,71,0.15);
    border-radius: 4px;
    padding: 0.3rem 0.6rem;
  }

  .zones-preview {
    margin-top: 0.25rem;
    display: flex;
    gap: 4px;
  }

  .zone-bar {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    opacity: 0.6;
  }

  .notification {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 12px;
    color: var(--text);
    transform: translateY(8px);
    opacity: 0;
    transition: all 0.2s;
    z-index: 200;
  }

  .notification.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="#e8ff47" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="7" fill="none" stroke="#e8ff47" stroke-width="1.5"/>
      <path d="M14 20 A6 6 0 0 1 26 20" stroke="#e8ff47" stroke-width="1.5" fill="none"/>
      <circle cx="20" cy="8" r="2.5" fill="#e8ff47"/>
      <path d="M20 10.5 L17 17 H23 L20 10.5Z" fill="#e8ff47" opacity="0.5"/>
    </svg>
    <div>
      <div class="auth-logo-text">COACH/</div>
      <div class="auth-tagline">cycling intelligence</div>
    </div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Registrarse</button>
    </div>

    <div id="auth-error" class="auth-error" style="display:none;"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="tu@email.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Entrar</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">COACH/</span>
      <span class="topbar-sep">/</span>
      <span class="topbar-conv" id="topbar-title">nueva sesión</span>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost" onclick="showProfileModal()">perfil</button>
      <button class="btn-ghost" onclick="logout()">salir</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Sesiones</span>
        <button class="btn-new" onclick="newConversation()" title="Nueva sesión">+</button>
      </div>
      <div class="conv-list" id="conv-list"></div>
      <div class="sidebar-footer">
        <button class="btn-profile" onclick="showProfileModal()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm0 1a5 5 0 0 0-5 5 .5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5 5 5 0 0 0-5-5z"/>
          </svg>
          <span id="sidebar-user-email">cuenta</span>
        </button>
      </div>
    </div>

    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="24" cy="24" r="8" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16 24 A8 8 0 0 1 32 24" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="24" cy="10" r="3" fill="currentColor"/>
          </svg>
          <p>Empieza una sesión con tu entrenador</p>
          <div class="quick-prompts">
            <button class="quick-prompt" onclick="sendQuick('¿Cómo está mi carga de entrenamiento esta semana?')">carga semanal</button>
            <button class="quick-prompt" onclick="sendQuick('Dame un entrenamiento de intervalos para hoy')">intervalos hoy</button>
            <button class="quick-prompt" onclick="sendQuick('¿Cuáles son mis zonas de potencia?')">mis zonas</button>
            <button class="quick-prompt" onclick="sendQuick('Necesito un plan de recuperación activa')">recuperación</button>
            <button class="quick-prompt" onclick="sendQuick('¿Cómo puedo mejorar mi FTP?')">mejorar FTP</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="msg-input"
            placeholder="Escribe a tu entrenador..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button class="btn-send" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal" onclick="closeModalIfOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Tu perfil ciclista</span>
      <button class="btn-close" onclick="closeProfileModal()">×</button>
    </div>

    <div id="profile-badge-area"></div>

    <div class="modal-grid">
      <div class="field">
        <label>FTP (watios)</label>
        <input type="number" id="p-ftp" placeholder="280" min="100" max="600"/>
      </div>
      <div class="field">
        <label>Peso (kg)</label>
        <input type="number" id="p-weight" placeholder="70" min="40" max="150" step="0.5"/>
      </div>
      <div class="field">
        <label>Horas / semana</label>
        <input type="number" id="p-hours" placeholder="8" min="1" max="30" step="0.5"/>
      </div>
      <div class="field">
        <label>Nivel</label>
        <select id="p-experience">
          <option value="beginner">Principiante</option>
          <option value="intermediate" selected>Intermedio</option>
          <option value="advanced">Avanzado</option>
        </select>
      </div>
      <div class="field span2">
        <label>Objetivo principal</label>
        <input type="text" id="p-goal" placeholder="ej: preparar Mallorca 312, mejorar FTP, perder peso"/>
      </div>
    </div>

    <div id="zones-preview-area"></div>

    <button class="btn-primary" onclick="saveProfile()">Guardar perfil</button>
  </div>
</div>

<div class="notification" id="notification"></div>

<script>
const API = 'http://localhost:3000/api'

let state = {
  token: localStorage.getItem('cc_token'),
  email: localStorage.getItem('cc_email'),
  conversationId: null,
  conversations: [],
  profile: null,
  loading: false,
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

async function init() {
  if (state.token) {
    showApp()
    await Promise.all([loadConversations(), loadProfile()])
  }
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none'
  document.getElementById('app-screen').classList.add('visible')
  document.getElementById('sidebar-user-email').textContent = state.email || 'cuenta'
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────

let authMode = 'login'

function switchTab(tab) {
  authMode = tab
  document.querySelectorAll('.auth-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab)
  })
  document.getElementById('auth-btn').textContent = tab === 'login' ? 'Entrar' : 'Crear cuenta'
  clearAuthError()
}

function clearAuthError() {
  const el = document.getElementById('auth-error')
  el.style.display = 'none'
  el.textContent = ''
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error')
  el.textContent = msg
  el.style.display = 'block'
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim()
  const password = document.getElementById('auth-pass').value
  if (!email || !password) { showAuthError('Completa todos los campos'); return }

  const btn = document.getElementById('auth-btn')
  btn.disabled = true
  btn.textContent = '...'
  clearAuthError()

  const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register'
  try {
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Error desconocido')

    if (authMode === 'register') {
      switchTab('login')
      showNotification('Cuenta creada. Inicia sesión.')
    } else {
      state.token = data.token
      state.email = data.user.email
      localStorage.setItem('cc_token', data.token)
      localStorage.setItem('cc_email', data.user.email)
      showApp()
      await Promise.all([loadConversations(), loadProfile()])
    }
  } catch (err) {
    showAuthError(err.message)
  } finally {
    btn.disabled = false
    btn.textContent = authMode === 'login' ? 'Entrar' : 'Crear cuenta'
  }
}

function logout() {
  state.token = null
  state.email = null
  state.conversationId = null
  state.conversations = []
  state.profile = null
  localStorage.removeItem('cc_token')
  localStorage.removeItem('cc_email')
  document.getElementById('app-screen').classList.remove('visible')
  document.getElementById('auth-screen').style.display = 'flex'
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="empty-state"><p>Empieza una sesión con tu entrenador</p></div>'
}

// ─── PROFILE ──────────────────────────────────────────────────────────────────

async function loadProfile() {
  try {
    const res = await apiFetch('/profile')
    if (res.ok) {
      const data = await res.json()
      state.profile = data.profile
    }
  } catch {}
}

function showProfileModal() {
  const modal = document.getElementById('profile-modal')
  modal.classList.add('visible')
  if (state.profile) {
    document.getElementById('p-ftp').value = state.profile.ftp || ''
    document.getElementById('p-weight').value = state.profile.weightKg || ''
    document.getElementById('p-hours').value = state.profile.hoursPerWeek || ''
    document.getElementById('p-goal').value = state.profile.goal || ''
    document.getElementById('p-experience').value = state.profile.experience || 'intermediate'
    renderProfileBadge()
    renderZonesPreview()
  }
}

function closeProfileModal() {
  document.getElementById('profile-modal').classList.remove('visible')
}

function closeModalIfOutside(e) {
  if (e.target === document.getElementById('profile-modal')) closeProfileModal()
}

function renderProfileBadge() {
  const area = document.getElementById('profile-badge-area')
  if (!state.profile || !state.profile.ftp || !state.profile.weightKg) {
    area.innerHTML = ''
    return
  }
  const wpkg = (state.profile.ftp / state.profile.weightKg).toFixed(2)
  area.innerHTML = `<div class="profile-badge">⚡ ${state.profile.ftp}w / ${wpkg} w/kg / ${state.profile.hoursPerWeek}h semana</div>`
}

function renderZonesPreview() {
  const area = document.getElementById('zones-preview-area')
  const ftp = parseInt(document.getElementById('p-ftp').value)
  if (!ftp) { area.innerHTML = ''; return }
  const colors = ['#444','#4a7c59','#2d6a4f','#e9c46a','#f4a261','#e76f51','#d62828']
  const labels = ['Z1','Z2','Z3','Z4','Z5','Z6','Z7']
  area.innerHTML = `
    <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Zonas de potencia</div>
    <div class="zones-preview">
      ${colors.map((c,i) => `<div class="zone-bar" style="background:${c}" title="${labels[i]}"></div>`).join('')}
    </div>
  `
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('p-ftp').addEventListener('input', renderZonesPreview)
})

async function saveProfile() {
  const ftp = parseInt(document.getElementById('p-ftp').value) || null
  const weightKg = parseFloat(document.getElementById('p-weight').value) || null
  const hoursPerWeek = parseFloat(document.getElementById('p-hours').value) || null
  const goal = document.getElementById('p-goal').value.trim() || null
  const experience = document.getElementById('p-experience').value

  try {
    const res = await apiFetch('/profile', {
      method: 'PUT',
      body: JSON.stringify({ ftp, weightKg, hoursPerWeek, goal, experience }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error)
    state.profile = data.profile
    closeProfileModal()
    showNotification('Perfil guardado ✓')
  } catch (err) {
    showNotification('Error: ' + err.message)
  }
}

// ─── CONVERSATIONS ─────────────────────────────────────────────────────────────

async function loadConversations() {
  try {
    const res = await apiFetch('/chat/conversations')
    if (res.ok) {
      const data = await res.json()
      state.conversations = data.conversations
      renderConvList()
    }
  } catch {}
}

function renderConvList() {
  const list = document.getElementById('conv-list')
  if (!state.conversations.length) {
    list.innerHTML = '<div style="padding:.75rem;font-size:11px;color:var(--text3)">Sin sesiones aún</div>'
    return
  }
  list.innerHTML = state.conversations.map(c => `
    <div class="conv-item ${c.id === state.conversationId ? 'active' : ''}"
         onclick="loadConversation('${c.id}')">
      ${escHtml(c.title || 'Sesión')}
    </div>
  `).join('')
}

async function loadConversation(id) {
  try {
    const res = await apiFetch(`/chat/conversations/${id}`)
    if (!res.ok) return
    const data = await res.json()
    const conv = data.conversation
    state.conversationId = id
    document.getElementById('topbar-title').textContent = conv.title || 'sesión'

    const container = document.getElementById('messages')
    container.innerHTML = ''
    conv.messages.forEach(m => appendMessage(m.role, m.content, false))
    container.scrollTop = container.scrollHeight
    renderConvList()
  } catch {}
}

function newConversation() {
  state.conversationId = null
  document.getElementById('topbar-title').textContent = 'nueva sesión'
  const container = document.getElementById('messages')
  container.innerHTML = `
    <div class="empty-state" id="empty-state">
      <p>Empieza una sesión con tu entrenador</p>
      <div class="quick-prompts">
        <button class="quick-prompt" onclick="sendQuick('¿Cómo está mi carga de entrenamiento esta semana?')">carga semanal</button>
        <button class="quick-prompt" onclick="sendQuick('Dame un entrenamiento de intervalos para hoy')">intervalos hoy</button>
        <button class="quick-prompt" onclick="sendQuick('¿Cuáles son mis zonas de potencia?')">mis zonas</button>
        <button class="quick-prompt" onclick="sendQuick('¿Cómo puedo mejorar mi FTP?')">mejorar FTP</button>
      </div>
    </div>`
  renderConvList()
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────

function sendQuick(text) {
  document.getElementById('msg-input').value = text
  sendMessage()
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
}

function autoResize(el) {
  el.style.height = 'auto'
  el.style.height = Math.min(el.scrollHeight, 160) + 'px'
}

async function sendMessage() {
  const input = document.getElementById('msg-input')
  const content = input.value.trim()
  if (!content || state.loading) return

  state.loading = true
  input.value = ''
  input.style.height = 'auto'
  document.getElementById('send-btn').disabled = true

  const emptyState = document.getElementById('empty-state')
  if (emptyState) emptyState.remove()

  appendMessage('user', content)

  const typingEl = appendTyping()

  try {
    const res = await apiFetch('/chat/message', {
      method: 'POST',
      body: JSON.stringify({ content, conversationId: state.conversationId }),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error)

    typingEl.remove()
    appendMessage('assistant', data.message.content)

    if (!state.conversationId) {
      state.conversationId = data.conversationId
      document.getElementById('topbar-title').textContent = content.slice(0, 50)
      await loadConversations()
    }
  } catch (err) {
    typingEl.remove()
    appendMessage('assistant', `Error: ${err.message}`)
  } finally {
    state.loading = false
    document.getElementById('send-btn').disabled = false
    input.focus()
  }
}

function appendMessage(role, content, scroll = true) {
  const container = document.getElementById('messages')
  const time = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
  const label = role === 'user' ? 'tú' : 'coach'

  const el = document.createElement('div')
  el.className = `msg ${role}`
  el.innerHTML = `
    <div class="msg-label">${label}</div>
    <div class="msg-bubble">${escHtml(content)}</div>
    <div class="msg-time">${time}</div>
  `
  container.appendChild(el)
  if (scroll) container.scrollTop = container.scrollHeight
  return el
}

function appendTyping() {
  const container = document.getElementById('messages')
  const el = document.createElement('div')
  el.className = 'msg assistant'
  el.innerHTML = `
    <div class="msg-label">coach</div>
    <div class="msg-bubble">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  `
  container.appendChild(el)
  container.scrollTop = container.scrollHeight
  return el
}

// ─── UTILS ────────────────────────────────────────────────────────────────────

function apiFetch(path, opts = {}) {
  return fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${state.token}`,
      ...(opts.headers || {}),
    },
  })
}

function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
}

function showNotification(msg) {
  const el = document.getElementById('notification')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}

document.getElementById('auth-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuth()
})

init()
</script>
</body>
</html>
